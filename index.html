<!DOCTYPE html>
<html>
  <head>
    <title>Snake Game</title>
	<link href= "https://i.ibb.co/dJLMZ43C/Snake-Green-removebg-preview.png"rel="icon">
  </head>
  <body>
    <canvas id="gameArea" width="480" height="320"></canvas>
    <script>
	  let rightPressed = false;
	  let leftPressed = false;
	  let upPressed = false;
	  let downPressed = false;
	  document.addEventListener("keydown",keyDownHandler);
	  document.addEventListener("keyup",keyUpHandler);
      const gameArea= document.getElementById("gameArea");
      const ctx = gameArea.getContext("2d");
      let x = gameArea.width/2 ;
      let y = gameArea.height/2 ;
	  let dx = 2;
	  let dy = -2;
      let radius = 20 ;
      function drawBall(){
        ctx.beginPath();
        ctx.arc(x,y,radius,0, Math.PI*2);
        ctx.fillStyle = "blue";
        ctx.fill();
        ctx.closePath();
      }
	  function draw(){
		ctx.clearRect(0,0,gameArea.width,gameArea.height);
		drawBall();
		x += dx;
		y += dy;
		requestAnimationFrame(draw);
	  }
	  draw();
    </script>
  </body>
</html>
